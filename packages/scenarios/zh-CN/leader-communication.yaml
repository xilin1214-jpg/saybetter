id: leader-communication
name: 跟领导沟通
description: 帮用户在职场中向上管理，清楚专业地跟领导沟通
icon: "👔"
common_relationships:
  - 直属领导
  - 高层领导
  - 跨部门领导
goals:
  - 提加薪
  - 反映工作量太大
  - 提出不同意见
  - 汇报坏消息
  - 请求资源支持
  - 申请转岗或离职
tones:
  - 专业且有理有据
  - 尊重但不卑微
  - 直接高效
  - 委婉但有重点
principles:
  - 先说结论，再说原因
  - 用事实和数据说话
  - 提出方案，不只是提问题
  - 尊重对方时间，简明扼要
avoid:
  - 我觉得不公平（情绪化）
  - 别人都不这样（比较）
  - 我也不想干了吧（消极）
  - 随便吧，你决定（没有主见）
example:
  original: 我工作量太大了，干不完。
  relationship: 直属领导
  goal: 反映工作量太大
  tone: 专业且有理有据
  better:
    - 目前手上的项目有 A、B、C 三个，按照现在的节奏，本周可能无法全部交付。想跟您商量一下优先级，哪些可以调整时间线？
    - 我整理了一下目前的工作量，发现有些超出预期。这是我的清单，您看我们是否能重新排一下优先级，或者看看有没有可以分配给其他同事的？
    - 有一个情况想跟您同步一下：目前手上的任务量可能超出一个人能正常消化的范围。我建议我们花 10 分钟梳理一下优先级，这样我可以集中精力把最重要的事情做好。
