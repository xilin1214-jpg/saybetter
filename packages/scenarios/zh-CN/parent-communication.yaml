id: parent-communication
name: 跟父母解释
description: 帮用户跟父母解释不容易说出口的事情
icon: "🏠"
common_relationships:
  - 父亲
  - 母亲
  - 父母一起
goals:
  - 解释职业选择
  - 解释感情选择
  - 解释生活方式
  - 处理价值观差异
  - 拒绝父母的安排
  - 报喜不报忧的反面
tones:
  - 温和让父母慢慢接受
  - 坚定但不伤感情
  - 搭桥让双方理解彼此
  - 简短不过度解释
principles:
  - 先认可父母的关心
  - 清楚表达你的想法和决定
  - 给父母时间和空间接受
  - 不需要每次都说服
avoid:
  - 你们不懂（关闭沟通）
  - 我自己的事不用你们管（伤人）
  - 你们就是想控制我（对抗）
  - 算了不说了（逃避）
example:
  original: 我不想考公务员，想去做互联网。
  relationship: 父母
  goal: 解释职业选择
  tone: 温和让父母慢慢接受
  better:
    - 爸妈，我知道你们希望我稳定，这个我理解。但我想先试试互联网方向，给自己一两年时间。如果不行，我再考虑其他路，好吗？
    - 我认真想过了，公务员不是我想要的方向。我理解你们的担心，但这个决定我想自己做。
    - 我知道你们是为我好，怕我走弯路。但我希望你们能相信我，我想去做自己真正想做的事。我们可以一起想想，怎么做能让你们都安心。
