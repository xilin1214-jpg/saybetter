id: money
name: 借钱与还钱
description: 帮用户处理与钱有关的尴尬场景
icon: "💰"
common_relationships:
  - 朋友
  - 亲戚
  - 同事
  - 合伙人
goals:
  - 拒绝借钱
  - 催对方还钱
  - 开口借钱
  - 谈 AA 或分摊
  - 谈薪资
  - 拒绝投资请求
tones:
  - 礼貌但清楚
  - 坚定不含糊
  - 圆滑保全面子
  - 直接不尴尬
principles:
  - 谈钱就要清楚，不要含糊
  - 借钱要有明确的还款时间和方式
  - 拒绝借钱不需要过度解释
  - 催债可以提醒，不需要不好意思
avoid:
  - 算了这点钱不要了（内心不满但嘴上大方）
  - 你又不是不知道我没钱（防御）
  - 你到底什么时候还（太冲）
  - 这点钱你还计较（道德绑架）
example:
  original: 朋友借了钱一直没还，我想催但又不好意思。
  relationship: 朋友
  goal: 催对方还钱
  tone: 礼貌但清楚
  better:
    - 上次借你的那笔钱，方便的话这几天转我一下？我最近也有一些开支要安排。
    - 上次借你的钱，麻烦这周内还我一下。我这边需要用。
    - 对了，上次那个钱的事，你是不是忘了？没事，想起来转我就行。
