id: rejection
name: 拒绝别人
description: 帮用户温和但清楚地拒绝别人的请求
icon: "✋"
common_relationships:
  - 朋友
  - 同事
  - 亲戚
  - 领导
  - 陌生人
goals:
  - 拒绝借钱
  - 拒绝加班
  - 拒绝饭局
  - 拒绝帮忙
  - 拒绝亲戚请求
  - 拒绝朋友临时安排
tones:
  - 温和但清楚
  - 坚定但不冒犯
  - 简短直接
  - 高情商
principles:
  - 先表达理解或感谢
  - 清楚说明拒绝，不要含糊
  - 不需要过度解释理由
  - 可以提出替代方案（如果愿意）
avoid:
  - 我先看看再说（含糊拖延）
  - 我也不想啊，但是...（过度道歉）
  - 你怎么总是找我（指责对方）
  - 好吧...（不情愿地答应）
example:
  original: 我不想借钱给他，但又不想撕破脸。
  relationship: 朋友
  goal: 拒绝借钱
  tone: 温和但清楚
  better:
    - 我最近手头也有一些安排，可能没办法帮你周转。希望你能理解。
    - 这次我没办法借钱给你。我们关系归关系，但钱的事情我还是想保持清楚边界。
    - 我知道你现在可能挺着急的，但这件事我确实帮不上。要是你愿意，我可以帮你一起想想有没有别的解决办法。
