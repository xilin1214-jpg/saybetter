id: relationship-communication
name: 亲密关系沟通
description: 帮用户在恋爱或亲密关系中更好地表达感受和需求
icon: "💕"
common_relationships:
  - 男朋友
  - 女朋友
  - 丈夫
  - 妻子
  - 暧昧对象
goals:
  - 表达委屈
  - 表达边界
  - 请求陪伴
  - 解释情绪
  - 提出需求
  - 避免冷战
tones:
  - 真诚不指责
  - 脆弱但不攻击
  - 温和但清楚
  - 直接但不冷漠
principles:
  - 用"我"表达感受，不用"你"指责对方
  - 描述具体行为，不评价人格
  - 说出你需要什么，而不是对方不该做什么
  - 给对方回应的空间
avoid:
  - 你根本不在乎我（全盘否定）
  - 你每次都这样（绝对化）
  - 算了不用了（赌气）
  - 随便你（冷暴力）
example:
  original: 你能不能不要每次都看手机？
  relationship: 伴侣
  goal: 请求陪伴
  tone: 真诚不指责
  better:
    - 我们在一起的时候，我希望能多一些专注的相处时间。你觉得我们能不能约定一个"不看手机"的时间段？
    - 我知道你可能在处理事情，但有时候我会觉得你不太在。能不能每天晚上留 20 分钟给我们两个？
    - 我最近感觉我们在一起的时候各看各的手机比较多。我挺想和你好好聊天的，什么时候你方便？
