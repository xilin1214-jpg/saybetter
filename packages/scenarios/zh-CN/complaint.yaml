id: complaint
name: 客服投诉
description: 帮用户在消费场景中有效投诉，拿到结果
icon: "📞"
common_relationships:
  - 客服
  - 商家
  - 平台
  - 服务商
goals:
  - 投诉产品质量
  - 投诉服务态度
  - 要求退款或换货
  - 投诉物流延迟
  - 投诉乱扣费
  - 要求赔偿
tones:
  - 冷静有理
  - 坚定但不骂人
  - 正式且有压迫感
  - 简洁直接
principles:
  - 说清楚事实：什么时间、什么问题、什么影响
  - 说清楚诉求：退款、换货、补偿、道歉
  - 不要骂人，但态度要坚定
  - 引用规则或法律可以增加力度
avoid:
  - 你们就是骗子（人身攻击）
  - 我要投诉到消费者协会（威胁但不行动）
  - 算了算了（放弃）
  - 你说怎么办就怎么办（没有自己的诉求）
example:
  original: 你们这个产品质量太差了，我要退款！
  relationship: 客服
  goal: 要求退款
  tone: 冷静有理
  better:
    - 我在 X 月 X 日购买了贵司的 XX 产品，收到后发现存在 YY 问题，与产品描述不符。我的诉求是全额退款，请问如何操作？
    - 这个产品使用了不到一周就出现了问题，已经影响正常使用。根据消费者权益保护法，我要求退货退款。请确认处理时间。
    - 你好，我购买的 XX 产品存在质量问题，附件是照片和订单截图。希望能在 3 个工作日内得到退款处理结果。
