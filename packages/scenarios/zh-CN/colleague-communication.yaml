id: colleague-communication
name: 跟同事沟通
description: 帮用户在日常工作中和同事高效、友好地沟通
icon: "🤝"
common_relationships:
  - 平级同事
  - 跨部门同事
  - 不太熟的同事
  - 合作密切的同事
goals:
  - 请求帮助
  - 提出协作需求
  - 反馈问题
  - 拒绝不合理请求
  - 处理意见分歧
tones:
  - 友好高效
  - 专业但不生分
  - 直接但尊重
  - 轻松但不随便
principles:
  - 说清楚需求和时间
  - 尊重对方的工作安排
  - 对事不对人
  - 给出具体的行动项
avoid:
  - 你到底什么时候能给我（催促但不给空间）
  - 这不是我的事（推卸）
  - 你不懂（居高临下）
  - 随便你（消极）
example:
  original: 这个需求不合理，我不想做。
  relationship: 平级同事
  goal: 拒绝不合理请求
  tone: 友好高效
  better:
    - 这个需求我理解你的出发点，但从实现角度来看有一些问题。我列了一下可能的风险，我们可以一起看看有没有更好的方案？
    - 我评估了一下，这个方案目前的时间线可能不太够。你觉得我们能不能先做一个 MVP，后面再迭代？
    - 我觉得这个方向有一些挑战。不过我有个替代思路，要不我们花 15 分钟讨论一下？
