id: salary-resignation
name: 谈薪与离职
description: 帮用户在职场关键节点上专业地表达自己的诉求
icon: "📋"
common_relationships:
  - 直属领导
  - HR
  - 猎头
  - 新公司
goals:
  - 谈加薪
  - 谈入职薪资
  - 提离职
  - 解释离职原因
  - 拒绝 counter offer
  - 谈离职时间
tones:
  - 专业有理有据
  - 感恩但坚定
  - 直接高效
  - 委婉但有底线
principles:
  - 谈薪用数据和成绩说话
  - 离职不抱怨，保持专业
  - 给出合理的交接时间
  - 不需要透露下家信息
avoid:
  - 不加薪我就走（威胁）
  - 这里太烂了不想待了（抱怨）
  - 我下周就不来了（不负责任）
  - 随便吧无所谓（没有立场）
example:
  original: 我想提离职，但不想撕破脸。
  relationship: 直属领导
  goal: 提离职
  tone: 感恩但坚定
  better:
    - 想跟您说一件事。我经过慎重考虑，决定接受一个新的机会。非常感谢这段时间您对我的指导和信任，我会认真做好交接。
    - 我计划在 X 月 X 日离职。这个决定不容易，但对我个人发展来说是必要的一步。我会把手上的事情整理清楚，确保平稳过渡。
    - 感谢您一直以来的照顾。我收到了一个和我职业规划更匹配的机会，想和您沟通一下离职的事情。您看我什么时候交接比较合适？
