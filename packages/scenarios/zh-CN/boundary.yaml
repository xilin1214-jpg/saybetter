id: boundary
name: 提出边界
description: 帮用户清楚表达自己的底线和边界
icon: "🚧"
common_relationships:
  - 朋友
  - 同事
  - 伴侣
  - 父母
  - 亲戚
goals:
  - 拒绝被占用时间
  - 拒绝被打探隐私
  - 设定沟通频率
  - 拒绝不合理要求
  - 保护自己情绪空间
tones:
  - 温和但坚定
  - 清楚不含糊
  - 冷静不解释
  - 高情商
principles:
  - 清楚说出你的边界是什么
  - 不需要为边界道歉
  - 不需要过度解释原因
  - 如果对方越界，重复边界而不争论
avoid:
  - 我也不是不想帮你，只是...（过度解释）
  - 你觉得这样合适吗（反问，容易引发争论）
  - 那随便你吧（消极抵抗）
  - 算了不说了（回避）
example:
  original: 我妈总是催我结婚，我很烦。
  relationship: 父母
  goal: 设定沟通频率
  tone: 温和但坚定
  better:
    - 妈，我知道你是关心我。但感情的事我有自己的节奏，我们能不能聊点别的？
    - 这个话题我们已经讨论过很多次了。我的想法没有变，如果你再提，我可能就不想继续这个话题了。
    - 我理解你的担心，但这个事情我想自己决定。当你准备好的时候，我很乐意和你聊其他事情。
