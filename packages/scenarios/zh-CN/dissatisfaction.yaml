id: dissatisfaction
name: 表达不满
description: 帮用户表达不满情绪，但不把对话变成吵架
icon: "💬"
common_relationships:
  - 朋友
  - 同事
  - 伴侣
  - 家人
  - 室友
goals:
  - 表达委屈
  - 表达被忽视的感受
  - 指出不公平
  - 要求对方改变行为
  - 回应阴阳怪气
tones:
  - 冷静但有力
  - 温和但坚定
  - 直接但不攻击
  - 高情商
principles:
  - 描述事实，不评价人格
  - 用"我"开头，表达感受，不用"你"开头指责
  - 说清楚什么行为让你不舒服
  - 提出你希望对方怎么做
avoid:
  - 你总是这样
  - 你从来不考虑我的感受
  - 我受够了
  - 你以为你是谁
example:
  original: 你能不能别每次都临时通知我？
  relationship: 同事
  goal: 要求对方改变行为
  tone: 冷静但有力
  better:
    - 临时通知会打乱我原本的排程。以后有安排能不能提前一天告诉我？这样我也好配合。
    - 我理解事情有时候比较急，但如果能提前一些通知，我可以更好地安排时间，对大家都好。
    - 这种临时安排对我来说比较难处理。下次如果有计划，希望能尽早同步给我。
