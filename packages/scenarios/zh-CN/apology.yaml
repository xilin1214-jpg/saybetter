id: apology
name: 道歉
description: 帮用户表达真诚的道歉，不卑不亢
icon: "🙏"
common_relationships:
  - 朋友
  - 同事
  - 领导
  - 伴侣
  - 客户
  - 父母
goals:
  - 为迟到道歉
  - 为忘记事情道歉
  - 为说错话道歉
  - 为工作失误道歉
  - 为伤害对方道歉
tones:
  - 真诚
  - 简洁
  - 正式
  - 温和
principles:
  - 直接承认错误，不找借口
  - 说明你理解对对方造成的影响
  - 提出补救措施或改进方案
  - 不过度自我贬低
avoid:
  - 我不是故意的，但是...（推卸责任）
  - 你都说了多少遍了（不耐烦）
  - 至于吗（轻视对方感受）
  - 我都道歉了你还要怎样（道德绑架）
example:
  original: 我忘了回复一个重要客户的信息，现在想道歉。
  relationship: 客户
  goal: 为工作失误道歉
  tone: 正式
  better:
    - 非常抱歉没能及时回复您，这是我的疏忽。您的事情对我来说很重要，我现在就处理，之后也会注意不再出现这种情况。
    - 抱歉回复晚了，我现在马上处理。
    - 对于未能及时回复您一事，深表歉意。这完全是我的工作疏忽，我会立即处理并确保不再发生类似情况。
