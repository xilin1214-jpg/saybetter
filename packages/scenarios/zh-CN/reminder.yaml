id: reminder
name: 催人办事
description: 帮用户在不冒犯对方的前提下，清楚推动事情进展
icon: "⏰"
common_relationships:
  - 同事
  - 朋友
  - 领导
  - 客户
  - 甲方
  - 家人
goals:
  - 催对方给反馈
  - 催对方交付结果
  - 催对方确认时间
  - 催对方还钱
  - 催对方回复消息
tones:
  - 温和但清楚
  - 坚定但不冒犯
  - 简短直接
  - 正式礼貌
  - 高情商
  - 礼貌但有压迫感
principles:
  - 说明具体事项
  - 给出明确时间点
  - 避免指责人格
  - 说明对后续的影响
  - 给对方一个可执行动作
avoid:
  - 你怎么又这样
  - 每次都是你拖
  - 你到底行不行
  - 为什么还没弄完
example:
  original: 你怎么又拖到现在？
  relationship: 同事
  goal: 催对方今天给结果
  tone: 礼貌但有压迫感
  better:
    - 这个事项今天需要有个明确结论，不然会影响后续进度。麻烦你今天下班前给我一个反馈。
    - 我这边后续安排依赖这个结果，所以想跟你确认一下，今天能否先给一个明确答复？
    - 我知道你手上事情可能也不少，但这个结果对后面的推进比较关键。我们能不能今天先把结论对齐一下？
