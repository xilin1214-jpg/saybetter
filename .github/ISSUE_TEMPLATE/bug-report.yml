name: "Bug Report"
description: "Report a bug in the web app"
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: "What happened? What did you expect?"
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: "How can we reproduce this?"
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: "Browser, OS, model provider"
      placeholder: "e.g., Chrome 120, macOS, OpenAI gpt-4o"
