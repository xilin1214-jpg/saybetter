name: Talking to Parents
slug: parents
description: Help users explain difficult things to their parents
inputs:
  - topic              # Topic (career choice/relationship/lifestyle/values clash)
  - original_message   # What you want to say
  - parents_attitude   # What you expect their reaction to be
outputs:
  - gentle             # Gentle: help them come around slowly
  - clear              # Clear: firm but loving
  - bridge             # Bridge: try to make both sides understand each other
  - not_recommended    # What NOT to say
examples:
  - input: "I don't want to take the civil service exam. I want to work in tech."
    outputs:
      gentle: "Mom, Dad, I know you want stability for me, and I get that. But I'd like to try the tech route first — give myself a year or two. If it doesn't work out, I'll reconsider. Okay?"
      clear: "I've thought about this carefully. The civil service path isn't what I want. I understand your concerns, but this is a decision I need to make for myself."
      bridge: "I know you're looking out for me, and you're afraid I'll take a wrong turn. But I hope you can trust me on this. I want to do something I'm genuinely committed to. Let's think together about how to make this work for all of us."
