name: 与父母沟通
slug: parents
description: 帮用户跟父母解释一些不容易说出口的事
inputs:
  - topic              # 话题（工作选择/感情/生活方式/价值观差异）
  - original_message   # 想说的原话
  - parents_attitude   # 父母可能的态度
outputs:
  - gentle             # 温和版：让父母慢慢接受
  - clear              # 清楚版：坚定但不伤感情
  - bridge             # 桥梁版：试着让双方理解彼此
  - not_recommended    # 反面教材
examples:
  - input: "我不想考公务员，想去做互联网。"
    outputs:
      gentle: "爸妈，我知道你们希望我稳定，这个我理解。但我想先试试互联网方向，给自己一两年时间。如果不行，我再考虑其他路，好吗？"
      clear: "我认真想过了，公务员不是我想要的方向。我理解你们的担心，但这个决定我想自己做。"
      bridge: "我知道你们是为我好，怕我走弯路。但我希望你们能相信我，我想去做自己真正想做的事。我们可以一起想想，怎么做能让你们都安心。"
