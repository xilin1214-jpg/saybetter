name: Apology
slug: apology
description: Help users express sincere apologies without being overly self-deprecating
inputs:
  - relationship       # Relationship to the other person
  - what_happened      # What went wrong
  - impact_on_other    # How it affected them
  - desired_tone       # Preferred tone
outputs:
  - sincere            # Sincere: own the mistake, no excuses
  - brief              # Brief: suitable for text messages
  - formal             # Formal: suitable for the workplace
  - not_recommended    # What NOT to say (over-apologizing or deflecting)
examples:
  - input: "I forgot to reply to an important client's message."
    outputs:
      sincere: "I'm really sorry for the delayed response — that was my oversight. Your matter is important to me, and I'm addressing it now. I'll make sure this doesn't happen again."
      brief: "Sorry for the late reply — on it now."
      formal: "Please accept my sincere apologies for the delayed response. This was entirely my oversight, and I am prioritizing it immediately."
