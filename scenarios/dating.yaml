name: Dating
slug: dating
description: Help users express themselves appropriately in dating and romantic scenarios
inputs:
  - stage              # Relationship stage (first chat/after date/talking stage/in a relationship)
  - original_message   # What you want to say
  - desired_tone       # Preferred tone
outputs:
  - natural            # Natural: authentic, not trying too hard
  - warm               # Warm: shows interest without being over the top
  - boundary           # Boundary: create distance without hurting them
  - not_recommended    # What NOT to say
examples:
  - input: "I don't want to continue seeing them, but I don't want to hurt them."
    outputs:
      natural: "I've enjoyed talking with you, but I think we work better as friends."
      warm: "I've really enjoyed getting to know you — you're genuinely a great person. But I've been thinking, and I don't think we're the right match romantically. I wouldn't want to keep you waiting."
      boundary: "Thank you for your time. I've thought about it carefully, and I don't think we should continue seeing each other. I wish you all the best."
