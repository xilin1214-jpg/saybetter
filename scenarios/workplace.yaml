name: Workplace Communication
slug: workplace
description: Help users communicate professionally and clearly at work
inputs:
  - context            # Workplace context (reporting/follow-up/feedback/meeting/email)
  - original_message   # What you want to say
  - target_audience    # Who you're talking to (manager/peer/report/client)
  - desired_tone       # Preferred tone
outputs:
  - professional       # Professional: suitable for formal settings
  - friendly           # Friendly: suitable for everyday peer communication
  - assertive          # Assertive: when you need to push things forward
  - not_recommended    # What NOT to say
examples:
  - input: "Why are you so late again?"
    outputs:
      professional: "This is running behind schedule. Can we finalize it today? I need the outcome to plan the next steps."
      friendly: "Hey, how's this going? I'm waiting on it — think you can get it to me today?"
      assertive: "This needs to be finalized today. The delay is already impacting downstream work — please confirm you can deliver by EOD."
