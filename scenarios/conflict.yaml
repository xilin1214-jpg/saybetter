name: Conflict Resolution
slug: conflict
description: Help users respond calmly and effectively in conflict situations
inputs:
  - scenario           # Conflict type (misunderstood/attacked/passive-aggressive/blamed)
  - original_message   # What the other person said
  - desired_outcome    # Desired outcome (de-escalate/clarify/push back/set boundary)
outputs:
  - deescalate         # De-escalate: lower the tension
  - clarify            # Clarify: state the facts without blame
  - push_back          # Push back: firm and dignified, without stooping
  - not_recommended    # What NOT to say
examples:
  - input: "A coworker makes a passive-aggressive comment in the group chat: 'Some people really love showing off.'"
    outputs:
      deescalate: "(Don't respond publicly — DM them instead) Hey, I noticed your message earlier. If there's something specific you'd like to discuss, I'm happy to talk it through."
      clarify: "If there's a specific concern, I'd appreciate you raising it directly so we can address it properly."
      push_back: "If you have something to say, say it directly. Indirect comments don't help anyone."
