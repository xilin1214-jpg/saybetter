name: Rejection
slug: rejection
description: Help users decline requests warmly but clearly
inputs:
  - relationship       # Relationship to the requester (friend/colleague/relative/stranger)
  - original_message   # What the other person asked
  - desired_tone       # Preferred tone (gentle/firm/warm)
outputs:
  - gentle             # Gentle: preserve the relationship as much as possible
  - firm               # Firm: set a clear boundary without ambiguity
  - warm               # Warm EQ: make them feel heard while still saying no
  - not_recommended    # What NOT to say
examples:
  - input: "A friend wants to borrow money but I don't want to lend it."
    outputs:
      gentle: "I've got some things coming up financially myself right now, so I won't be able to help with that. I hope you understand — it's not about you, I'm just not in a position to."
      firm: "I can't lend you money this time. Our relationship is separate from finances, and I prefer to keep it that way."
      warm: "I can tell this is important to you, and I wish I could help. I can't lend money, but if you want, I'm happy to brainstorm other options together."
