name: Money Matters
slug: money
description: Help users handle awkward money-related conversations
inputs:
  - scenario           # Scenario (lending/borrowing/splitting bill/salary negotiation/bargaining)
  - relationship       # Relationship to the other person
  - original_message   # What you want to say
outputs:
  - polite             # Polite: courteous and low-pressure
  - firm               # Firm: clear and direct about the money
  - tactful            # Tactful: smooth, saves face for both sides
  - not_recommended    # What NOT to say
examples:
  - input: "A friend borrowed money and hasn't paid it back. I want to remind them but feel awkward."
    outputs:
      polite: "Hey, about the money from last time — whenever you get a chance, could you send it over? I've got some expenses coming up."
      firm: "The money you borrowed — I need it back by the end of this week. I have things I need to pay for."
      tactful: "Oh hey, that money from last time — you might have forgotten? No worries, just send it whenever you remember."
