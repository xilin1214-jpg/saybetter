name: 金钱相关
slug: money
description: 帮用户处理与钱有关的尴尬场景
inputs:
  - scenario           # 场景（借钱/催债/AA/谈薪/砍价）
  - relationship       # 和对方的关系
  - original_message   # 想说的原话
outputs:
  - polite             # 礼貌版
  - firm               # 坚定版
  - tactful            # 圆滑版
  - not_recommended    # 反面教材
examples:
  - input: "朋友借了钱一直没还，我想催但又不好意思。"
    outputs:
      polite: "上次借你的那笔钱，方便的话这几天转我一下？我最近也有一些开支要安排。"
      firm: "上次借你的钱，麻烦这周内还我一下。我这边需要用。"
      tactful: "对了，上次那个钱的事，你是不是忘了？没事，想起来转我就行。"
